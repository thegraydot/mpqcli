name: Release

on:
  workflow_call

permissions:
  contents: write
  packages: write

jobs:
  release_binaries:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve release version
        id: version
        run: echo "version=$(make get_project_version)" >> "$GITHUB_OUTPUT"

      - name: Download Linux GLIBC binary
        uses: actions/download-artifact@v8
        with:
          name: mpqcli-linux-amd64-glibc

      - name: Download Linux MUSL binary
        uses: actions/download-artifact@v8
        with:
          name: mpqcli-linux-amd64-musl

      - name: Download Linux ARM64 GLIBC binary
        uses: actions/download-artifact@v8
        with:
          name: mpqcli-linux-arm64-glibc

      - name: Download Linux ARM64 MUSL binary
        uses: actions/download-artifact@v8
        with:
          name: mpqcli-linux-arm64-musl

      - name: Download Windows binary
        uses: actions/download-artifact@v8
        with:
          name: mpqcli-windows-amd64.exe

      - name: Extract changelog for this tag
        id: changelog
        run: |
          {
            echo "content<<EOF"
            make get_changelog TAG="${{ steps.version.outputs.version }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Release package
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "$CHANGELOG_CONTENT" \
            mpqcli-linux-amd64-glibc \
            mpqcli-linux-amd64-musl \
            mpqcli-linux-arm64-glibc \
            mpqcli-linux-arm64-musl \
            mpqcli-windows-amd64.exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.content }}

  release_docker:
    needs: release_binaries
    runs-on: ubuntu-24.04
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v8
        with:
          name: mpqcli-docker

      - name: Load Docker image
        run: |
          docker load -i mpqcli-docker.tar

      - name: Tag Docker image with version
        run: |
          docker tag mpqcli ghcr.io/thegraydot/mpqcli:${{ needs.release_binaries.outputs.version }}
          docker tag mpqcli ghcr.io/thegraydot/mpqcli:latest

      - name: Push Docker image to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push ghcr.io/thegraydot/mpqcli:${{ needs.release_binaries.outputs.version }}
          docker push ghcr.io/thegraydot/mpqcli:latest
